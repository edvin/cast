name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: cast-server-windows-amd64.exe
            binary: cast-server.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cast-server-macos-arm64
            binary: cast-server
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cast-server-linux-amd64
            binary: cast-server

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p cast-server

      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: desktop
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: cast-desktop-windows-setup
          path: target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: cast-desktop-macos-dmg
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  release:
    needs: [build-cli, build-desktop]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cast-server-windows-amd64.exe/cast-server-windows-amd64.exe
            artifacts/cast-server-macos-arm64/cast-server-macos-arm64
            artifacts/cast-server-linux-amd64/cast-server-linux-amd64
            artifacts/cast-desktop-windows-setup/*
            artifacts/cast-desktop-macos-dmg/*
            scripts/install-windows.ps1
            scripts/uninstall-windows.ps1
