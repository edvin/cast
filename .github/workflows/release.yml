name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # CLI binary builds (standalone server, no GUI)
  build-cli:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: cast-server-windows-amd64.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cast-server-macos-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cast-server-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        working-directory: server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: cp server/target/${{ matrix.target }}/release/cast-server ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: cp server/target/${{ matrix.target }}/release/cast-server.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # Desktop app builds (Tauri with tray icon + GUI)
  build-desktop:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: desktop
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: cast-desktop-windows-setup
          path: target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: cast-desktop-macos-dmg
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  release:
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cast-server-windows-amd64.exe/cast-server-windows-amd64.exe
            artifacts/cast-server-macos-arm64/cast-server-macos-arm64
            artifacts/cast-server-linux-amd64/cast-server-linux-amd64
            artifacts/cast-desktop-windows-setup/*
            artifacts/cast-desktop-macos-dmg/*
            scripts/install-windows.ps1
            scripts/uninstall-windows.ps1
