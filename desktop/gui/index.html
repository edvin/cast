<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: #161616;
            border-bottom: 1px solid #222;
            -webkit-app-region: drag;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; transition: background 0.3s; }
        .status-dot.running { background: #34c759; box-shadow: 0 0 8px #34c75966; }
        .status-dot.stopped { background: #ff3b30; }
        .header h1 { font-size: 16px; font-weight: 600; color: #fff; }
        .header-info { font-size: 12px; color: #888; }

        .tabs { display: flex; background: #161616; border-bottom: 1px solid #222; }
        .tab {
            padding: 10px 24px; font-size: 13px; color: #888; cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.2s;
        }
        .tab:hover { color: #ccc; }
        .tab.active { color: #fff; border-bottom-color: #0a84ff; }

        .content { flex: 1; overflow: hidden; position: relative; }
        .page { position: absolute; inset: 0; padding: 24px; overflow-y: auto; display: none; flex-direction: column; }
        .page.active { display: flex !important; }

        /* Log viewer */
        .log-container {
            background: #111; border: 1px solid #222; border-radius: 8px;
            padding: 16px 16px 24px 16px; flex: 1; min-height: 0; overflow-y: auto;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 12px; line-height: 1.6;
        }
        .log-entry { display: flex; gap: 12px; }
        .log-time { color: #555; flex-shrink: 0; }
        .log-msg { color: #ccc; word-break: break-all; }
        .log-entry:last-child .log-msg { color: #fff; }

        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; flex-shrink: 0; }
        .stat-card { background: #161616; border: 1px solid #222; border-radius: 8px; padding: 16px; }
        .stat-card .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .stat-card .value { font-size: 18px; font-weight: 600; color: #fff; }

        /* Settings */
        .settings-form { max-width: 500px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .field input { width: 100%; padding: 10px 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 14px; outline: none; }
        .field input:focus { border-color: #0a84ff; }
        .field input::placeholder { color: #555; }
        .save-btn { padding: 10px 24px; background: #0a84ff; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .save-btn:hover { background: #0070e0; }
        .save-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .save-msg { margin-left: 12px; font-size: 13px; color: #34c759; opacity: 0; transition: opacity 0.3s; }
        .save-msg.show { opacity: 1; }
        .note { font-size: 12px; color: #555; margin-top: 20px; }

        /* Series browser */
        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding-bottom: 24px;
        }
        .series-card {
            background: #161616;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
        }
        .series-card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }
        .series-card-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #111;
        }
        .series-card-body { padding: 14px; }
        .series-card-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 4px; }
        .series-card-meta { font-size: 11px; color: #888; display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .series-card-meta .rating { color: #f5c518; }
        .series-card-overview { font-size: 11px; color: #666; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .series-card-episodes { font-size: 11px; color: #0a84ff; margin-top: 8px; }

        /* Series detail overlay */
        .detail-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; z-index: 100; overflow-y: auto;
        }
        .detail-overlay.active { display: block; }
        .detail-content {
            max-width: 100%; margin: 0; background: #161616;
            overflow: hidden; min-height: 100%;
        }
        .detail-hero {
            position: relative; height: 250px; overflow: hidden;
        }
        .detail-hero img {
            width: 100%; height: 100%; object-fit: cover; object-position: top;
        }
        .detail-hero-gradient {
            position: absolute; bottom: 0; left: 0; right: 0; height: 150px;
            background: linear-gradient(transparent, #161616);
        }
        .detail-hero-info {
            position: absolute; bottom: 16px; left: 20px; right: 20px;
        }
        .detail-hero-title { font-size: 24px; font-weight: 700; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
        .detail-hero-meta { font-size: 12px; color: #aaa; margin-top: 4px; }
        .detail-hero-meta .rating { color: #f5c518; }

        .detail-body { padding: 20px; }
        .detail-overview { font-size: 13px; color: #999; line-height: 1.5; margin-bottom: 20px; }
        .detail-close {
            position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.6);
            border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%;
            font-size: 16px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center;
        }
        .detail-close:hover { background: rgba(255,255,255,0.2); }

        .episode-list { display: flex; flex-direction: column; gap: 10px; }
        .episode-row {
            display: flex; align-items: center; gap: 14px; padding: 10px 12px;
            background: #1a1a1a; border-radius: 8px; transition: background 0.15s;
        }
        .episode-row:hover { background: #222; }
        .ep-thumb {
            width: 120px; height: 68px; border-radius: 6px; object-fit: cover; background: #111; flex-shrink: 0;
        }
        .ep-info { flex: 1; min-width: 0; }
        .ep-label { font-size: 11px; color: #666; }
        .ep-title { font-size: 13px; font-weight: 500; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ep-overview { font-size: 11px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .ep-meta { font-size: 10px; color: #555; margin-top: 3px; }
        .ep-status { flex-shrink: 0; font-size: 11px; }
        .ep-status .watched { color: #34c759; }
        .ep-status .in-progress { color: #0a84ff; }
        .ep-status .format-badge {
            display: inline-block; padding: 2px 6px; border-radius: 4px;
            font-size: 10px; font-weight: 600;
        }
        .ep-status .mp4 { background: #1a3a1a; color: #34c759; }
        .ep-status .mkv { background: #3a2a1a; color: #ff9500; }

        .series-empty {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: #555; gap: 12px;
        }
        .series-empty svg { width: 48px; height: 48px; fill: #444; }

        /* Action buttons */
        .action-btn {
            padding: 6px 14px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 6px; color: #ccc; font-size: 12px; cursor: pointer;
            transition: all 0.15s;
        }
        .action-btn:hover { background: #252525; border-color: #555; color: #fff; }
        .action-btn.danger:hover { border-color: #ff3b30; color: #ff3b30; }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .action-btn-sm {
            padding: 3px 8px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 4px; color: #aaa; font-size: 10px; cursor: pointer;
        }
        .action-btn-sm:hover { background: #252525; color: #fff; }
        .action-btn-sm:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="status-dot" id="statusDot"></div>
            <h1>Cast Server</h1>
        </div>
        <span class="header-info" id="headerInfo">Starting...</span>
    </div>

    <div class="tabs">
        <div class="tab" data-page="library">Library</div>
        <div class="tab active" data-page="logs">Logs</div>
        <div class="tab" data-page="settings">Settings</div>
    </div>

    <div class="content">
        <!-- Library page -->
        <div class="page" id="page-library">
            <div id="seriesGrid" class="series-grid"></div>
            <div id="seriesEmpty" class="series-empty" style="display:none;">
                <div style="font-size: 40px;">📺</div>
                <div>No series found</div>
                <div style="font-size: 12px;">Configure your media path in Settings</div>
            </div>
        </div>

        <!-- Logs page -->
        <div class="page active" id="page-logs">
            <div class="stats" id="statsBar">
                <div class="stat-card"><div class="label">Status</div><div class="value" id="statStatus">Starting...</div></div>
                <div class="stat-card"><div class="label">Port</div><div class="value" id="statPort">—</div></div>
                <div class="stat-card"><div class="label">Server Name</div><div class="value" id="statName">—</div></div>
                <div class="stat-card"><div class="label">Media Path</div><div class="value" id="statPath" style="font-size: 13px; word-break: break-all;">—</div></div>
            </div>
            <div class="log-container" id="logContainer"></div>
        </div>

        <!-- Settings page -->
        <div class="page" id="page-settings">
            <div class="settings-form">
                <div class="field"><label>Media Path</label><input type="text" id="cfgMediaPath" placeholder="C:/Videos or /path/to/media"></div>
                <div class="field"><label>TMDB API Key</label><input type="text" id="cfgTmdbKey" placeholder="Optional — for metadata and artwork"></div>
                <div class="field"><label>Server Name</label><input type="text" id="cfgServerName" placeholder="Cast Server"></div>
                <div class="field"><label>Port</label><input type="number" id="cfgPort" placeholder="3456"></div>
                <div>
                    <button class="save-btn" id="saveBtn">Save & Start Server</button>
                    <span class="save-msg" id="saveMsg">Saved!</span>
                </div>
                <p class="note">Settings are saved alongside the executable.</p>
            </div>
        </div>
    </div>

    <!-- Series detail overlay -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-content" id="detailContent"></div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;
        const { listen } = window.__TAURI__.event;

        let serverPort = 3456;

        function apiUrl(path) { return `http://127.0.0.1:${serverPort}${path}`; }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('page-' + tab.dataset.page).classList.add('active');
                if (tab.dataset.page === 'library') loadLibrary();
            });
        });

        // --- Logs ---
        const logContainer = document.getElementById('logContainer');

        function addLog(timestamp, message) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${timestamp}</span><span class="log-msg">${esc(message)}</span>`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        async function loadLogs() {
            const logs = await invoke('get_logs');
            logContainer.innerHTML = '';
            logs.forEach(log => addLog(log.timestamp, log.message));
        }

        listen('server-log', (e) => {
            const now = new Date().toLocaleTimeString('en-GB', { hour12: false });
            addLog(now, e.payload);
        });
        listen('server-status', (e) => updateStatus(e.payload));

        function updateStatus(running, mediaPath) {
            const dot = document.getElementById('statusDot');
            const statStatus = document.getElementById('statStatus');
            const headerInfo = document.getElementById('headerInfo');
            if (!mediaPath && !running) {
                dot.className = 'status-dot stopped';
                statStatus.textContent = 'Not configured';
                statStatus.style.color = '#ff9500';
                headerInfo.textContent = 'Set media path in Settings';
            } else {
                dot.className = 'status-dot ' + (running ? 'running' : 'stopped');
                statStatus.textContent = running ? 'Running' : 'Stopped';
                statStatus.style.color = running ? '#34c759' : '#ff3b30';
                headerInfo.textContent = running ? 'Running' : 'Not running';
            }
        }

        async function loadStats() {
            const stats = await invoke('get_server_stats');
            serverPort = stats.port;
            updateStatus(stats.running, stats.media_path);
            document.getElementById('statPort').textContent = stats.port;
            document.getElementById('statName').textContent = stats.name || '—';
            document.getElementById('statPath').textContent = stats.media_path || 'Not configured';
        }

        // --- Settings ---
        async function loadSettings() {
            const config = await invoke('get_config');
            document.getElementById('cfgMediaPath').value = config.media_path;
            document.getElementById('cfgTmdbKey').value = config.tmdb_key;
            document.getElementById('cfgServerName').value = config.server_name;
            document.getElementById('cfgPort').value = config.port;
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const btn = document.getElementById('saveBtn');
            const config = {
                media_path: document.getElementById('cfgMediaPath').value,
                tmdb_key: document.getElementById('cfgTmdbKey').value,
                server_name: document.getElementById('cfgServerName').value || 'Cast Server',
                port: parseInt(document.getElementById('cfgPort').value) || 3456,
            };
            try {
                btn.disabled = true;
                btn.textContent = 'Saving...';
                await invoke('save_config', { config });
                btn.textContent = 'Starting server...';
                await invoke('restart_server');
                const msg = document.getElementById('saveMsg');
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 3000);
                // Switch to logs
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelector('[data-page="logs"]').classList.add('active');
                document.getElementById('page-logs').classList.add('active');
                loadStats();
            } catch (e) { alert('Error: ' + e); }
            finally { btn.disabled = false; btn.textContent = 'Save & Start Server'; }
        });

        // --- Library ---
        async function loadLibrary() {
            const grid = document.getElementById('seriesGrid');
            const empty = document.getElementById('seriesEmpty');
            try {
                const resp = await fetch(apiUrl('/api/series'));
                if (!resp.ok) throw new Error('Server not responding');
                const series = await resp.json();

                if (series.length === 0) {
                    grid.style.display = 'none';
                    empty.style.display = 'flex';
                    return;
                }

                grid.style.display = 'grid';
                empty.style.display = 'none';
                grid.innerHTML = series.map(s => `
                    <div class="series-card" onclick="showDetail('${s.id}')">
                        ${s.has_backdrop
                            ? `<img class="series-card-image" src="${apiUrl('/api/series/' + s.id + '/backdrop')}" loading="lazy">`
                            : s.has_art
                                ? `<img class="series-card-image" src="${apiUrl('/api/series/' + s.id + '/art')}" loading="lazy">`
                                : `<div class="series-card-image" style="display:flex;align-items:center;justify-content:center;font-size:32px;color:#333;">${s.title.charAt(0)}</div>`
                        }
                        <div class="series-card-body">
                            <div class="series-card-title">${esc(s.title)}</div>
                            <div class="series-card-meta">
                                ${s.year ? `<span>${s.year}</span>` : ''}
                                ${s.rating ? `<span class="rating">★ ${s.rating.toFixed(1)}</span>` : ''}
                                ${s.genres ? `<span>${esc(s.genres)}</span>` : ''}
                            </div>
                            ${s.overview ? `<div class="series-card-overview">${esc(s.overview)}</div>` : ''}
                            <div class="series-card-episodes">${s.episode_count} episode${s.episode_count !== 1 ? 's' : ''} · ${s.watched_count} watched</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                grid.style.display = 'none';
                empty.style.display = 'flex';
                empty.innerHTML = '<div style="font-size: 40px;">⚠️</div><div>Cannot connect to server</div><div style="font-size: 12px;">Start the server from Settings</div>';
            }
        }

        async function showDetail(seriesId) {
            const overlay = document.getElementById('detailOverlay');
            const content = document.getElementById('detailContent');

            try {
                const resp = await fetch(apiUrl(`/api/series/${seriesId}`));
                const detail = await resp.json();

                const hasMkv = detail.episodes.some(ep => ep.format !== 'mp4');
                const formatSummary = (() => {
                    const formats = {};
                    detail.episodes.forEach(ep => {
                        const f = ep.format.toUpperCase();
                        formats[f] = (formats[f] || 0) + 1;
                    });
                    return Object.entries(formats).map(([k, v]) => `${v} ${k}`).join(', ');
                })();

                content.innerHTML = `
                    <div class="detail-hero" style="position: relative;">
                        <button class="detail-close" onclick="closeDetail()">✕</button>
                        ${detail.has_backdrop
                            ? `<img src="${apiUrl('/api/series/' + detail.id + '/backdrop')}">`
                            : detail.has_art
                                ? `<img src="${apiUrl('/api/series/' + detail.id + '/art')}" style="filter: blur(10px); transform: scale(1.1);">`
                                : `<div style="width:100%;height:100%;background:#111;"></div>`
                        }
                        <div class="detail-hero-gradient"></div>
                        <div class="detail-hero-info">
                            <div class="detail-hero-title">${esc(detail.title)}</div>
                            <div class="detail-hero-meta">
                                ${detail.year ? detail.year : ''}
                                ${detail.genres ? ` · ${esc(detail.genres)}` : ''}
                                ${detail.rating ? ` · <span class="rating">★ ${detail.rating.toFixed(1)}</span>` : ''}
                                · ${formatSummary}
                            </div>
                        </div>
                    </div>
                    <div class="detail-body">
                        ${detail.overview ? `<div class="detail-overview">${esc(detail.overview)}</div>` : ''}

                        <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                            ${hasMkv ? `<button class="action-btn" onclick="remuxSeries('${detail.id}', this)">⚡ Remux All to MP4</button>` : ''}
                            <button class="action-btn" onclick="refreshMetadata('${detail.id}', this)">🔄 Refresh Metadata</button>
                            <button class="action-btn danger" onclick="resetProgress('${detail.id}', this)">↩ Reset Watch Progress</button>
                        </div>

                        <div class="episode-list">
                            ${detail.episodes.map(ep => {
                                const watched = ep.progress?.completed;
                                const inProgress = ep.progress && !ep.progress.completed;
                                const fmt = ep.format.toUpperCase();
                                const fmtClass = fmt === 'MP4' ? 'mp4' : 'mkv';
                                const sizeMB = (ep.size_bytes / 1048576).toFixed(0);
                                return `
                                    <div class="episode-row">
                                        ${ep.still_url
                                            ? `<img class="ep-thumb" src="${ep.still_url}" loading="lazy">`
                                            : `<div class="ep-thumb" style="display:flex;align-items:center;justify-content:center;color:#444;font-size:11px;">${ep.season_number ? 'S' + ep.season_number + ' E' + ep.episode_number : 'Ep ' + (ep.index+1)}</div>`
                                        }
                                        <div class="ep-info">
                                            <div class="ep-label">${ep.season_number ? 'S' + ep.season_number + ' E' + ep.episode_number : 'Episode ' + (ep.index+1)}</div>
                                            <div class="ep-title">${esc(ep.title)}</div>
                                            ${ep.overview ? `<div class="ep-overview">${esc(ep.overview)}</div>` : ''}
                                            <div class="ep-meta">
                                                ${ep.runtime_minutes ? ep.runtime_minutes + ' min' : ''}
                                                ${ep.air_date ? ' · ' + ep.air_date : ''}
                                                · ${sizeMB} MB
                                                · <span style="font-size:9px;color:#666;">${esc(ep.filename)}</span>
                                            </div>
                                        </div>
                                        <div class="ep-status" style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                                            <span class="format-badge ${fmtClass}">${fmt}</span>
                                            ${watched ? '<span class="watched">✓ Watched</span>' : ''}
                                            ${inProgress ? '<span class="in-progress">▶ ' + Math.round(ep.progress.position_secs / ep.progress.duration_secs * 100) + '%</span>' : ''}
                                            ${fmtClass === 'mkv' ? `<button class="action-btn-sm" onclick="event.stopPropagation(); prepareEp('${ep.id}', this)">Remux</button>` : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;

                overlay.classList.add('active');
            } catch (e) {
                console.error('Failed to load detail:', e);
            }
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('active');
        }

        // Close overlay on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDetail();
        });

        // Close overlay on background click
        document.getElementById('detailOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeDetail();
        });

        // --- Actions ---
        async function remuxSeries(seriesId, btn) {
            btn.disabled = true;
            btn.textContent = '⚡ Remuxing...';
            try {
                const resp = await fetch(apiUrl(`/api/series/${seriesId}/remux`), { method: 'POST' });
                const result = await resp.json();
                btn.textContent = `⚡ ${result.triggered} triggered`;
                setTimeout(() => { btn.textContent = '⚡ Remux All to MP4'; btn.disabled = false; }, 3000);
            } catch (e) {
                btn.textContent = '⚡ Failed';
                setTimeout(() => { btn.textContent = '⚡ Remux All to MP4'; btn.disabled = false; }, 2000);
            }
        }

        async function refreshMetadata(seriesId, btn) {
            btn.disabled = true;
            btn.textContent = '🔄 Refreshing...';
            try {
                await fetch(apiUrl('/api/metadata/fetch'), { method: 'POST' });
                btn.textContent = '🔄 Done!';
                setTimeout(() => showDetail(seriesId), 1500);
            } catch (e) {
                btn.textContent = '🔄 Failed';
            }
            setTimeout(() => { btn.textContent = '🔄 Refresh Metadata'; btn.disabled = false; }, 3000);
        }

        async function resetProgress(seriesId, btn) {
            if (!confirm('Reset all watch progress for this series?')) return;
            btn.disabled = true;
            try {
                await fetch(apiUrl(`/api/series/${seriesId}/progress`), { method: 'DELETE' });
                btn.textContent = '↩ Reset!';
                setTimeout(() => showDetail(seriesId), 1000);
            } catch (e) {
                btn.textContent = '↩ Failed';
            }
            setTimeout(() => { btn.textContent = '↩ Reset Watch Progress'; btn.disabled = false; }, 2000);
        }

        async function prepareEp(episodeId, btn) {
            btn.disabled = true;
            btn.textContent = 'Remuxing...';
            try {
                await fetch(apiUrl(`/api/episodes/${episodeId}/prepare`), { method: 'POST' });
                // Poll for completion
                const poll = setInterval(async () => {
                    const resp = await fetch(apiUrl(`/api/episodes/${episodeId}/prepare`), { method: 'POST' });
                    const status = await resp.json();
                    if (status.ready) {
                        clearInterval(poll);
                        btn.textContent = '✓ Done';
                        btn.style.color = '#34c759';
                    } else if (status.progress_percent !== null) {
                        btn.textContent = `${status.progress_percent}%`;
                    }
                }, 3000);
            } catch (e) {
                btn.textContent = 'Failed';
                btn.disabled = false;
            }
        }

        // Poll stats
        setInterval(loadStats, 5000);

        // Initial load
        loadLogs();
        loadStats();
        loadSettings();
    </script>
</body>
</html>
